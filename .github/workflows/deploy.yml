name: Deploy Website CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/tes_server
        chmod 600 ~/.ssh/tes_server
        ssh-keyscan -p 8022 -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

    - name: Deploy to Server
      run: |
       run: |
          rsync -avz --delete \
          --exclude='.git*' \
          --exclude='.github*' \
          ./ polindra123@${{ secrets.HOST }}:/var/www/html/2405011_WEBSITE_CICD
