<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nabil Studio</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
  <div class="logo">Nabil Stani Studio</div>
  <nav id="nav">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#portfolio">Portfolio</a>
    <a href="#contact">Contact</a>
  </nav>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

<section id="home" class="hero">
  <h1>Build Your Dream Website</h1>
  <p>Modern • Clean • Interactive</p>
  <button onclick="scrollToSection('portfolio')">See My Work</button>
</section>

<section id="about" class="section">
  <h2>About Me</h2>
  <p>Website statis modern dengan desain menarik dan interaktif.</p>
</section>

<section id="services" class="section">
  <h2>Services</h2>
  <div class="cards">
    <div class="card">🌐 Web Development</div>
    <div class="card">🎨 UI/UX Design</div>
    <div class="card">⚡ Frontend React</div>
  </div>
</section>

<section id="portfolio" class="section">
  <h2>Portfolio</h2>
  <div class="gallery">
    <img src="https://picsum.photos/400?1" onclick="openModal(this.src)">
    <img src="https://picsum.photos/400?2" onclick="openModal(this.src)">
    <img src="https://picsum.photos/400?3" onclick="openModal(this.src)">
    <img src="https://picsum.photos/400?4" onclick="openModal(this.src)">
  </div>
</section>

<section id="contact" class="section">
  <h2>Contact</h2>
  <form onsubmit="submitForm(event)">
    <input type="text" placeholder="Nama" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Pesan" required></textarea>
    <button type="submit">Kirim</button>
  </form>
  <p id="msg"></p>
</section>

<footer>
  <p>© 2026 Nabil Studio</p>
</footer>

<!-- Modal -->
<div id="modal" onclick="closeModal()">
  <img id="modal-img">
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
